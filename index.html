<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Equation Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Handwritten Equation Solver</h1>
            <p>Upload an image of a handwritten equation to recognize and solve it</p>
        </header>

        <div class="upload-section">
            <div class="upload-box" id="uploadBox">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Drag and drop your image here</p>
                <p class="small">or</p>
                <button class="btn-upload" id="browseBtn">Browse Files</button>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <p class="small supported">Supported: PNG, JPG, JPEG</p>
            </div>
        </div>

        <div id="results" class="results hidden">
            <div class="image-preview">
                <h3>Input Image</h3>
                <img id="previewImage" src="" alt="Preview">
            </div>

            <div class="output-section">
                <div class="result-card">
                    <label>Equation (LaTeX)</label>
                    <div class="result-value" id="equationOutput">-</div>
                </div>

                <div class="result-card">
                    <label>Expression</label>
                    <div class="result-value" id="expressionOutput">-</div>
                </div>

                <div class="result-card">
                    <label>Answer</label>
                    <div class="result-value answer" id="answerOutput">-</div>
                </div>

                <button class="btn-reset" id="resetBtn">Try Another Image</button>
            </div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Processing image...</p>
        </div>

        <div id="error" class="error hidden">
            <p id="errorMsg"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
